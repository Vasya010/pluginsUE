<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">

  <!-- Clipboard body -->
  <rect x="2.8" y="2.0" 
        width="10.4" height="12.0" 
        rx="1.28" 
        fill="#bfbfbf" stroke="#2b2b2b" stroke-width="0.96" />

  <!-- Clipboard top clip -->
  <rect x="5.6" y="1.2" 
        width="4.8" height="2.88" 
