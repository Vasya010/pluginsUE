  <!-- Task lines -->
  <line x1="4.72" y1="6.0" 
        x2="11.280000000000001" y2="6.0" 
        stroke="#4a4a4a" stroke-width="0.8" stroke-linecap="round"/>
        
  <line x1="4.72" y1="8.4" 
        x2="11.280000000000001" y2="8.4" 
        stroke="#4a4a4a" stroke-width="0.8" stroke-linecap="round"/>
        
  <line x1="4.72" y1="10.8" 
        x2="9.2" y2="10.8" 
        stroke="#4a4a4a" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Clock -->
